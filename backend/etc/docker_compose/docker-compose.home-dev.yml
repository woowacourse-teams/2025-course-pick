name: coursepick-home-dev
services:

  mongodb:
    image: mongo:8.0.12
    container_name: coursepick-home-dev-mongodb
    env_file:
      - /var/lib/coursepick/env/.env.home-dev
    volumes:
      - mongodb_dev_data:/data/db
    restart: unless-stopped

  backend:
    image: coursepick-backend:home-dev
    container_name: coursepick-home-dev-backend
    build:
      context: ../..
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - /var/lib/coursepick/env/.env.home-dev
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    volumes:
      - /var/lib/coursepick/logs/home-dev:/var/lib/coursepick/logs
    depends_on:
      - mongodb

volumes:
  mongodb_dev_data:
