spring:
  config:
    activate.on-profile: prod
    import: classpath:monitoring-config.yml
  data.mongodb:
    host: mongodb
    port: 27017
    database: coursepick
    username: ${MONGO_USERNAME}
    password: ${MONGO_PASSWORD}
    authentication-database: admin

osrm.url: ${OSRM_URL}
admin:
  token: ${ADMIN_TOKEN}
  kakao-map-api-key: ${ADMIN_KAKAO_MAP_API_KEY}
notice.base-url: http://dev.coursepick.cloud/images
jwt.secret-key: ${JWT_SECRET_KEY}

springdoc:
  api-docs.enabled: false
  swagger-ui.enabled: false
