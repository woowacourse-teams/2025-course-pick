spring:
  config:
    activate.on-profile: prod
    import: classpath:monitoring-config.yml
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    mongodb:
      host: ${MONGO_HOST}
      port: ${MONGO_PORT}
      database: ${MONGO_DATABASE}
      username: ${MONGO_USERNAME}
      password: ${MONGO_PASSWORD}
      authentication-database: ${MONGO_AUTH_DATABASE}

      # Connection Pool 설정
      max-pool-size: 30
      min-pool-size: 10

      # timeout 설정
      max-wait-time: 2000
      socket-timeout: 3000
      connect-timeout: 1000
      max-connection-idle-time: 30000

springdoc:
  api-docs.enabled: false
  swagger-ui.enabled: false

osrm.url: ${OSRM_URL}
admin:
  token: ${ADMIN_TOKEN}
  kakao-map-api-key: ${ADMIN_KAKAO_MAP_API_KEY}
notice.base-url: ${BASE_URL}
