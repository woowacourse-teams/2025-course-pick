name: Backend Home Server Deploy Template

on:
  workflow_call:
    inputs:
      compose_project:
        required: true
        type: string
      compose_file:
        required: true
        type: string
      health_port:
        required: true
        type: number
      container_name:
        required: true
        type: string

jobs:
  ci:
    name: CI 실행
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit

  deploy:
    name: 홈서버 배포
    needs: ci
    runs-on: [ self-hosted, home-server ]
    defaults:
      run:
        working-directory: backend

    env:
      COMPOSE_PROJECT: ${{ inputs.compose_project }}
      COMPOSE_FILE: ${{ inputs.compose_file }}

    steps:
      - name: 레포지토리 불러오기
        uses: actions/checkout@v4

      - name: 📦 빌드 결과물 다운로드 (Artifact)
        uses: actions/download-artifact@v4
        with:
          name: backend-build-artifact
          path: backend/build/libs

      - name: 🚀 홈서버 배포 시작
        run: |
          echo "🏗️ Docker 이미지 빌드..."
          docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" build

          echo "▶️ 새 서버 시작..."
          docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" up -d

          echo "🧹 사용하지 않는 이미지 정리..."
          docker image prune -f

      - name: ⛑️ 헬스 체크
        run: |
          for i in $(seq 1 10); do
            SERVER_STATUS=$(curl -o /dev/null -w "%{http_code}" http://localhost:${{ inputs.health_port }}/actuator/health || echo "000")
            if [ "$SERVER_STATUS" -eq 200 ]; then
              echo "✅ 배포 성공! 서버 동작 중..."
              exit 0
            else
              echo "Attempt $i/10: 헬스 체크 실패 (status=$SERVER_STATUS). 5초 후 재시도..."
              sleep 5
            fi
          done

          echo "❌ 배포 실패! 서버가 동작하지 않습니다."
          docker logs ${{ inputs.container_name }} --tail 50
          exit 1
