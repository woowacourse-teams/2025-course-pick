name: Discord Alert

on:
  pull_request:
    types: [ opened, review_requested, ready_for_review ]
  pull_request_review:
    types: [ submitted ]
  schedule:
    - cron: '0 15 * * *'

env:
  ID_MAP: |
    {
      "doabletuple": "<@295280090632028160>",
      "dompoo": "<@354278903130357763>",
      "kkiseug": "<@476402713111035904>",
      "giovannijunseokim": "<@1000267441332555776>",
      "wondroid-world": "<@1114787651422277723>",
      "jhpark1227": "<@559277825710882841>",
      "tobae-time": "<@1438454861439041647>",
      "choizz156": "<@952791760055193631>",
      "mmm307955": "<@1239952287850565642>"
    }

jobs:
  notify:
    name: 알림보내기
    runs-on: ubuntu-latest
    steps:
      - name: GitHub ID와 Discord ID 매핑
        id: mapper
        shell: bash
        run: |
          # 1. PR 생성은 팀 공지 성격이므로 항상 알림
          if [[ "${{ github.event.action }}" == "opened" || "${{ github.event.action }}" == "ready_for_review" ]]; then
            echo "SHOULD_NOTIFY=true" >> $GITHUB_ENV
            echo "MENTION_TARGET=" >> $GITHUB_ENV
            exit 0
          fi

          # 2. 이벤트에 따른 알림 대상자 결정
          if [[ "${{ github.event.action }}" == "review_requested" ]]; then
            TARGET_GITHUB_ID="${{ github.event.requested_reviewer.login }}"
          else
            TARGET_GITHUB_ID="${{ github.event.pull_request.user.login }}"
          fi

          # 3. 본인이 본인에게 알림을 보내는 상황인지 체크
          SENDER_GITHUB_ID="${{ github.event.sender.login }}"
          if [[ "$TARGET_GITHUB_ID" == "$SENDER_GITHUB_ID" ]]; then
            echo "SHOULD_NOTIFY=false" >> $GITHUB_ENV
          else
            echo "SHOULD_NOTIFY=true" >> $GITHUB_ENV
          fi

          # 4. Discord ID 매핑
          DISCORD_ID=$(echo "$ID_MAP" | jq -r --arg key "$TARGET_GITHUB_ID" '.[$key] // $key')
          echo "MENTION_TARGET=$DISCORD_ID" >> $GITHUB_ENV

      - name: PR 정보 추출
        if: env.SHOULD_NOTIFY == 'true' && (github.event.action == 'opened' || github.event.action == 'ready_for_review')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          to_mention() {
            local discord_id
            discord_id=$(echo "$ID_MAP" | jq -r --arg key "$1" '.[$key] // empty')
            if [ -n "$discord_id" ]; then
              echo "${discord_id}"
            else
              echo "$1"
            fi
          }

          PR_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER")

          ASSIGNEES=$(echo "$PR_DATA" | jq -r '.assignees[].login' | \
            while read -r id; do to_mention "$id"; done | paste -sd', ')
          REVIEWERS=$(echo "$PR_DATA" | jq -r '.requested_reviewers[].login' | \
            while read -r id; do to_mention "$id"; done | paste -sd', ')

          echo "ASSIGNEES=${ASSIGNEES:-없음}" >> "$GITHUB_ENV"
          echo "REVIEWERS=${REVIEWERS:-없음}" >> "$GITHUB_ENV"

      - name: PR 생성 알림
        if: >
          env.SHOULD_NOTIFY == 'true'
          && (
          (github.event.action == 'opened' && github.event.pull_request.draft == false)
          || github.event.action == 'ready_for_review'
          )
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🆕 **#{{ EVENT_PAYLOAD.pull_request.number }} PR 생성**
            **제목**: [{{ EVENT_PAYLOAD.pull_request.title }}](<{{ EVENT_PAYLOAD.pull_request.html_url }}>)
            **담당자**: ${{ env.ASSIGNEES }}
            **리뷰어**: ${{ env.REVIEWERS }}
            ―――――――――――――――――――――――――

      - name: PR 생성 시간 확인
        if: github.event.action == 'review_requested'
        id: check_age
        run: |
          created_at="${{ github.event.pull_request.created_at }}"
          created_ts=$(date -d "$created_at" +%s)
          now_ts=$(date +%s)
          diff=$((now_ts - created_ts))
          if [ "$diff" -lt 60 ]; then
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 리뷰 요청 알림
        if: >
          env.SHOULD_NOTIFY == 'true'
          && github.event.action == 'review_requested'
          && steps.check_age.outputs.is_new != 'true'
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🙇‍♂️ **리뷰 요청**
            🎯 {{ EVENT_PAYLOAD.sender.login }} → ${{ env.MENTION_TARGET }}
            🔗 [{{ EVENT_PAYLOAD.pull_request.title }}](<{{ EVENT_PAYLOAD.pull_request.html_url }}>)
            ―――――――――――――――――――――――――

      - name: 리뷰 완료 알림
        if: env.SHOULD_NOTIFY == 'true' && github.event_name == 'pull_request_review'
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            ✅ **리뷰 등록**
            🎯 {{ EVENT_PAYLOAD.sender.login }} → ${{ env.MENTION_TARGET }}
            🔗 [{{ EVENT_PAYLOAD.pull_request.title }}](<{{ EVENT_PAYLOAD.review.html_url }}>)
            ―――――――――――――――――――――――――

      - name: 마감 임박 PR 리마인드 알림
        if: github.event_name == 'schedule'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          to_mention() {
            local discord_id
            discord_id=$(echo "$ID_MAP" | jq -r --arg key "$1" '.[$key] // empty')
            if [ -n "$discord_id" ]; then
              echo "${discord_id}"
            else
              echo "$1"
            fi
          }

          PRS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls?state=open&per_page=100")

          echo "$PRS" | jq -c '.[]' | while read -r PR; do
            PR_NUMBER=$(echo "$PR" | jq -r '.number')
            PR_URL=$(echo "$PR"    | jq -r '.html_url')
            PR_TITLE=$(echo "$PR"  | jq -r '.title')
            LABEL=$(echo "$PR" | jq -r '.labels[].name' | grep -E '^(D-[0-9]+|D-Day)$' | head -1)

            [ -z "$LABEL" ] && continue

            ASSIGNEES=$(echo "$PR" | jq -r '[.assignees[].login] | join(" ")' | \
              xargs -n1 | while read -r id; do to_mention "$id"; done | paste -sd', ')
            REVIEWERS=$(echo "$PR" | jq -r '[.requested_reviewers[].login] | join(" ")' | \
              xargs -n1 | while read -r id; do to_mention "$id"; done | paste -sd', ')

            [ -z "$ASSIGNEES" ] && ASSIGNEES="없음"
            [ -z "$REVIEWERS" ] && REVIEWERS="없음"

            MSG=$(printf "⏰ **#%s PR이 %s 상태입니다!**\n**제목**: [%s](<%s>)\n**담당자**: %s\n**리뷰어**: %s\n―――――――――――――――――――――――――" \
              "$PR_NUMBER" "$LABEL" "$PR_TITLE" "$PR_URL" "$ASSIGNEES" "$REVIEWERS")

            BODY=$(jq -n --arg content "$MSG" '{"content": $content, "flags": 4}')

            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$BODY"
          done
