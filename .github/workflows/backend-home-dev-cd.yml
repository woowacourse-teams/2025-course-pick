name: Backend Home Dev Server CD

on:
  push:
    branches: [ be-develop ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: 홈서버 배포
    runs-on: [ self-hosted, home-server ]

    env:
      COMPOSE_PROJECT: coursepick-home-dev # 프로젝트 이름
      COMPOSE_FILE: etc/docker_compose/docker-compose.home-dev.yml # 컴포즈 파일 경로
      CONTAINER_NAME: coursepick-home-dev-backend
      HEALTH_PORT: 8080

    defaults:
      run:
        working-directory: backend

    steps:
      - name: 레포지토리 불러오기
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 프로젝트 gradlew 빌드(테스트 수행 및 API 문서 작성)
        run: ./gradlew clean build

      - name: 🚀 홈서버 배포 시작
        run: |
          echo "🏗️ Docker 이미지 빌드..."
          docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" build

          echo "▶️ 새 서버 시작..."
          docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" up -d

          echo "🧹 사용하지 않는 이미지 정리..."
          docker image prune -f

      - name: ⛑️ 헬스 체크
        run: |
          for i in $(seq 1 10); do
            SERVER_STATUS=$(curl -o /dev/null -w "%{http_code}" http://localhost:"$HEALTH_PORT"/actuator/health || echo "000")
            if [ "$SERVER_STATUS" -eq 200 ]; then
              echo "✅ 배포 성공! 서버 동작 중..."
              exit 0
            else
              echo "Attempt $i/10: 헬스 체크 실패 (status=$SERVER_STATUS). 5초 후 재시도..."
              sleep 5
            fi
          done

          echo "❌ 배포 실패! 서버가 동작하지 않습니다."
          docker logs "$CONTAINER_NAME" --tail 50
          exit 1
