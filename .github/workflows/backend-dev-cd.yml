name: Backend Dev Server CD

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  ci:
    name: CI 실행
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit

  build:
    name: 도커 이미지 빌드 & 푸시
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 레포지토리 불러오기
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 프로젝트 gradlew 빌드
        run: ./gradlew clean build -x test

      - name: Docker 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 및 푸시
        run: |
          docker buildx build \
            --platform=linux/arm64 \
            -t ${{ secrets.DOCKER_USERNAME }}/coursepick-backend:dev \
            --push \
            .

  deploy:
    name: 개발서버 배포
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/coursepick
            
            echo "🚀 개발 서버 배포 시작..."
            
            echo "📦 최신 이미지 Pull..."
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/coursepick-backend:dev
            
            echo "🌳 .env 파일 생성..."
            cat > .env <<'EOF'
            ${{ secrets.DEV_ENV_FILE }}
            EOF
            chmod 600 .env
            
            echo "▶️ 새 서버 시작..."
            sudo docker compose --env-file .env up -d --pull always backend
            
            echo "🧹 사용하지 않는 이미지 정리..."
            sudo docker image prune -a -f
            
            echo "⛑️ 헬스 체크..."
            for i in $(seq 1 10); do
              SERVER_STATUS=$(curl -o /dev/null -w "%{http_code}" http://localhost:80/actuator/health || echo "000")
              if [ "$SERVER_STATUS" -eq 200 ]; then
                echo "✅ 배포 성공! 서버 동작 중..."
                exit 0
              else
                echo "Attempt $i/10: 헬스 체크 실패 (status=$SERVER_STATUS). 5초 후 재시도..."
                sleep 5
              fi
            done
            
            echo "❌ 배포 실패! 서버가 동작하지 않습니다."
            sudo docker logs coursepick-backend --tail 50
            exit 1
